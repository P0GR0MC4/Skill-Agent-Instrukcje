{% extends "base_email.html" %}
{% block title %}Witaj w Mailer!{% endblock %}
{% block content %}
<h2 style="color: #333333;">Cześć {{ user_name | default('Użytkowniku') }}!</h2>
<p style="color: #666666; line-height: 1.5;">Cieszymy się, że jesteś z nami. Twoje konto zostało pomyślnie utworzone.</p>
<p style="text-align: center; margin-top: 30px;">
    <a href="{{ confirmation_url }}" style="background-color: #007bff; color: #ffffff; padding: 12px 20px; text-decoration: none; border-radius: 5px; font-weight: bold;">Potwierdź swój profil</a>
</p>
{% endblock %}
